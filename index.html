<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Firehouse Snack Vote</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Archivo:wght@400;500;600;700&display=swap');

:root{
  --red:#C8102E; --red-deep:#8E0B20; --amber:#FFB400;
  --char:#15171B; --char2:#1E2127; --steel:#2A2E36; --line:#33373F;
  --cream:#F3EFE7; --mut:#8A909A; --mut2:#6B7079;
  --good:#3DBE6B;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Archivo',system-ui,sans-serif;background:var(--char);color:var(--cream);
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  background-image:
    radial-gradient(circle at 15% -10%, #25272e 0%, transparent 45%),
    repeating-linear-gradient(45deg, transparent 0 22px, rgba(255,255,255,.012) 22px 44px);
}
.wrap{max-width:880px;margin:0 auto;padding:0 14px 110px;}

/* ---- header ---- */
.head{position:relative;background:linear-gradient(180deg,var(--red) 0%,var(--red-deep) 100%);
  border-bottom:4px solid var(--amber);overflow:hidden;}
.headwrap{max-width:880px;margin:0 auto;padding:26px 18px 24px;}
.kicker{font-family:'Oswald';font-weight:600;letter-spacing:3px;font-size:11px;
  color:#ffd9df;text-transform:uppercase;}
.title{font-family:'Oswald';font-weight:700;font-size:clamp(30px,7vw,52px);line-height:.95;
  text-transform:uppercase;letter-spacing:1px;margin:5px 0 7px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.22);}
.sub{font-size:14px;max-width:560px;color:#ffe7ea;line-height:1.5;}
.hazard{height:8px;background:repeating-linear-gradient(45deg,#15171B 0 16px,var(--amber) 16px 32px);opacity:.9;}

/* ---- tabs ---- */
.tabs{display:flex;gap:8px;margin:16px 0 4px;}
.tab{flex:1;font-family:'Oswald';font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  font-size:14px;padding:13px;border:2px solid var(--line);background:var(--char2);color:var(--mut);
  cursor:pointer;border-radius:10px;transition:.15s;}
.tab:hover{color:var(--cream);}
.tab.on{background:var(--red);color:#fff;border-color:var(--amber);}

/* ---- name + filters ---- */
.namebar{position:sticky;top:0;z-index:20;background:rgba(21,23,27,.96);
  backdrop-filter:blur(6px);padding:12px 0 10px;border-bottom:1px solid var(--line);margin-bottom:6px;}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:6px;
  font-family:'Oswald';font-weight:600;}
.name{width:100%;padding:14px 16px;font-size:16px;font-family:'Archivo';background:var(--char2);
  border:2px solid var(--line);border-radius:10px;color:var(--cream);outline:none;}
.name:focus{border-color:var(--amber);}
.namehelp{font-size:12px;color:var(--mut);margin-top:6px;line-height:1.4;}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 2px;}
.filter{display:flex;align-items:center;gap:8px;font-size:13.5px;color:#c4c9d1;cursor:pointer;
  user-select:none;background:var(--char2);border:2px solid var(--line);border-radius:30px;padding:8px 13px 8px 9px;}
.filter.on{border-color:var(--amber);color:var(--cream);}
.toggle{width:38px;height:22px;border-radius:14px;background:var(--steel);position:relative;transition:.2s;flex:none;}
.filter.on .toggle{background:var(--amber);}
.knob{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;}
.filter.on .knob{left:19px;}

/* ---- ballot ---- */
.cat{margin-top:22px;}
.catname{font-family:'Oswald';font-weight:600;font-size:19px;text-transform:uppercase;letter-spacing:1px;
  padding-bottom:8px;border-bottom:2px solid var(--red);color:var(--cream);
  display:flex;justify-content:space-between;align-items:center;gap:10px;}
.catcount{font-size:13px;letter-spacing:1px;color:var(--mut);flex:none;}
.catcount.full{color:var(--amber);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;margin-top:12px;}
.item{display:flex;align-items:center;gap:10px;padding:13px;border:2px solid var(--line);
  background:var(--char2);border-radius:10px;cursor:pointer;font-size:14.5px;color:var(--cream);
  line-height:1.25;text-align:left;width:100%;transition:.12s;min-height:54px;}
.item:hover{border-color:#565c66;}
.item.sel{background:linear-gradient(180deg,var(--red) 0%,var(--red-deep) 100%);border-color:var(--amber);color:#fff;}
.item.lock{opacity:.38;cursor:not-allowed;}
.item.lock:hover{border-color:var(--line);}
.writein{width:100%;margin-top:12px;padding:13px;background:var(--char2);border:2px solid var(--line);
  border-radius:10px;color:var(--cream);font-family:'Archivo';font-size:14.5px;line-height:1.4;
  outline:none;resize:vertical;min-height:66px;}
.writein:focus{border-color:var(--amber);}
.check{width:22px;height:22px;border-radius:6px;border:2px solid #5a6068;flex:none;display:grid;
  place-items:center;font-size:14px;font-weight:700;}
.item.sel .check{background:var(--amber);border-color:var(--amber);color:#15171B;}
.iname{flex:1;}
.badges{display:flex;gap:3px;flex:none;font-size:14px;line-height:1;}

/* ---- submit ---- */
.submit{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:40;
  font-family:'Oswald';font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:16px;
  padding:15px 32px;background:var(--amber);color:#15171B;border:none;border-radius:50px;cursor:pointer;
  box-shadow:0 8px 26px rgba(0,0,0,.5);max-width:calc(100% - 28px);}
.submit:disabled{background:var(--steel);color:#6b7079;cursor:not-allowed;box-shadow:none;}

/* ---- results ---- */
.statrow{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;}
.statcard{flex:1;min-width:120px;background:var(--char2);border:2px solid var(--line);border-radius:12px;padding:15px;}
.statnum{font-family:'Oswald';font-size:34px;font-weight:700;color:var(--amber);line-height:1;}
.statlbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-top:5px;}
.row{margin:9px 0;}
.rowtop{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;margin-bottom:4px;gap:8px;}
.rname{flex:1;}
.rct{font-family:'Oswald';font-weight:600;color:var(--amber);flex:none;font-size:14px;}
.bar{height:13px;background:var(--steel);border-radius:7px;overflow:hidden;}
.fill{height:100%;background:linear-gradient(90deg,var(--red),var(--amber));border-radius:7px;transition:width .4s;}
.toolbar{display:flex;gap:8px;margin-bottom:8px;}
.btn{font-family:'Oswald';font-weight:600;letter-spacing:1px;text-transform:uppercase;font-size:13px;
  padding:11px 18px;background:var(--char2);color:var(--cream);border:2px solid var(--line);
  border-radius:9px;cursor:pointer;}
.btn:hover{border-color:#565c66;}

/* ---- shared states ---- */
.note{font-size:12.5px;color:var(--mut2);margin-top:8px;line-height:1.5;}
.center{text-align:center;padding:48px 18px;}
.center h2{font-family:'Oswald';font-size:30px;text-transform:uppercase;color:var(--amber);margin-bottom:8px;}
.center p{color:#c4c9d1;line-height:1.5;}
.link{color:var(--amber);text-decoration:underline;cursor:pointer;background:none;border:none;font:inherit;padding:0;}
.msg{border-radius:10px;padding:13px 15px;font-size:13.5px;line-height:1.5;margin:14px 0;}
.msg.warn{background:#3a2a00;border:2px solid var(--amber);color:#ffe9b0;}
.msg.err{background:#3a1416;border:2px solid var(--red);color:#ffd2d6;}
.spinner{width:30px;height:30px;border:3px solid var(--steel);border-top-color:var(--amber);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:60;background:var(--good);
  color:#06270f;font-weight:600;font-size:14px;padding:11px 20px;border-radius:30px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
.hide{display:none;}
/* ---- budget ---- */
.bgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin:16px 0 6px;}
.bfield{display:flex;flex-direction:column;gap:5px;font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:var(--mut);font-family:'Oswald';font-weight:600;}
.bnum{padding:11px 12px;font-size:16px;font-family:'Archivo';background:var(--char2);border:2px solid var(--line);
  border-radius:9px;color:var(--cream);outline:none;}
.bnum:focus{border-color:var(--amber);}
.brow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);}
.binfo{flex:1;min-width:0;}
.bname{font-size:14.5px;line-height:1.25;}
.bmeta{font-size:12px;color:var(--mut2);margin-top:3px;}
.bqty{display:flex;align-items:center;gap:6px;flex:none;}
.qbtn{width:32px;height:32px;border-radius:8px;border:2px solid var(--line);background:var(--char2);
  color:var(--cream);font-size:18px;font-weight:700;cursor:pointer;line-height:1;display:grid;place-items:center;}
.qbtn:hover{border-color:var(--amber);}
.qin{width:46px;text-align:center;padding:7px 4px;font-size:15px;font-family:'Archivo';background:var(--char);
  border:2px solid var(--line);border-radius:8px;color:var(--cream);outline:none;}
.qin:focus{border-color:var(--amber);}
.bcost{flex:none;width:64px;text-align:right;font-family:'Oswald';font-weight:600;font-size:14.5px;color:var(--cream);}
.bsum{margin:20px 0 0;background:var(--char2);border:2px solid var(--line);border-radius:12px;padding:16px;}
.bbar{height:16px;background:var(--steel);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.bbarfill{height:100%;background:linear-gradient(90deg,var(--good),var(--amber));border-radius:8px;transition:width .4s;}
.bbarfill.over{background:linear-gradient(90deg,var(--amber),var(--red));}
.bsumrow{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-size:14.5px;color:#c4c9d1;}
.bsumrow strong{font-family:'Oswald';font-size:18px;color:var(--cream);}
.green{color:var(--good)!important;}
.red{color:#ff6b73!important;}
/* ---- receipts ---- */
.drop{border:2px dashed var(--line);border-radius:12px;background:var(--char2);padding:26px 18px;text-align:center;
  margin:16px 0 4px;transition:.15s;cursor:pointer;}
.drop:hover,.drop.over{border-color:var(--amber);background:#20232a;}
.drop .big{font-family:'Oswald';font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:1px;color:var(--cream);}
.drop .sm{font-size:12.5px;color:var(--mut);margin-top:6px;line-height:1.5;}
.preview{display:flex;gap:12px;align-items:flex-start;margin:14px 0;flex-wrap:wrap;}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;}
.thumb{position:relative;}
.thumb img{width:84px;height:112px;border-radius:10px;border:2px solid var(--line);object-fit:cover;display:block;}
.pdfthumb{width:84px;height:112px;border-radius:10px;border:2px solid var(--line);background:var(--char);display:grid;place-items:center;font-family:'Oswald';font-weight:600;font-size:13px;color:var(--mut);}
.thumbx{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;border:2px solid var(--char);
  background:var(--red);color:#fff;font-size:13px;font-weight:700;line-height:1;cursor:pointer;}
.thumbn{position:absolute;bottom:4px;left:4px;background:rgba(21,23,27,.85);color:var(--cream);font-size:11px;
  font-family:'Oswald';font-weight:600;padding:1px 6px;border-radius:6px;}
.ocrbar{flex:1;min-width:200px;}
.ocrbar .bar{height:10px;background:var(--steel);border-radius:6px;overflow:hidden;margin:8px 0;}
.rtable{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;}
.rtable th{font-family:'Oswald';font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:var(--mut);text-align:left;padding:6px 6px;border-bottom:2px solid var(--line);}
.rtable td{padding:5px 6px;border-bottom:1px solid var(--line);vertical-align:middle;}
.rtable input,.rtable select{width:100%;padding:8px 8px;font-family:'Archivo';font-size:14px;background:var(--char);
  border:2px solid var(--line);border-radius:8px;color:var(--cream);outline:none;}
.rtable input:focus,.rtable select:focus{border-color:var(--amber);}
.rtable td.qtycol input,.rtable td.pricecol input{text-align:right;}
.rtable td.xcol{width:34px;text-align:center;}
.xbtn{width:28px;height:28px;border-radius:7px;border:2px solid var(--line);background:var(--char2);color:#ff9aa0;
  font-size:15px;font-weight:700;cursor:pointer;line-height:1;}
.xbtn:hover{border-color:var(--red);}
.rmeta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin:14px 0 6px;}
.report{background:var(--char2);border:2px solid var(--line);border-radius:12px;padding:16px;margin-top:16px;}
.report h3{font-family:'Oswald';font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:1px;
  color:var(--amber);margin-bottom:4px;}
.report .rsec{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase;
  color:var(--cream);margin:12px 0 4px;border-bottom:1px solid var(--line);padding-bottom:4px;}
.report .rln{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:3px 0;color:#c4c9d1;}
.report .rtot{display:flex;justify-content:space-between;font-family:'Oswald';font-weight:700;font-size:16px;
  color:var(--cream);margin-top:12px;border-top:2px solid var(--line);padding-top:10px;}
</style>
</head>
<body>

<div class="head"><div class="headwrap">
  <div class="kicker">Crew Snack Vote</div>
  <div class="title">Firehouse Snack Vote</div>
  <div class="sub">Pick up to <strong>3 per section</strong>. Badges: <strong>🟢 pocket-proof</strong> (survives your turnouts), <strong>🫠 melts</strong> in the heat, and <strong>🛒 bought last week</strong>. No account needed.</div>
</div></div>
<div class="hazard"></div>

<div class="wrap">
  <div id="banner"></div>
  <div class="tabs">
    <button id="tab-vote" class="tab on" type="button">Vote</button>
    <button id="tab-results" class="tab" type="button">Results</button>
    <button id="tab-budget" class="tab" type="button">Budget</button>
    <button id="tab-receipts" class="tab" type="button">Receipts</button>
  </div>
  <div id="vote-view"></div>
  <div id="results-view" class="hide"></div>
  <div id="budget-view" class="hide"></div>
  <div id="receipts-view" class="hide"></div>
</div>

<div id="toast" class="toast">Vote submitted</div>

<script>
/* ============================================================================
   CONFIG  —  paste your three URLs here, then re-upload index.html.
   See README.md for exactly where each one comes from.
   ============================================================================ */
const CONFIG = {
  SCRIPT_URL:    "https://script.google.com/macros/s/AKfycbzHCt5URYTHvivzAvxS4_MVcZfcapBvkV7uC34diQ7LKW5Pesollxb7FjSV4IuLflQJeg/exec", // votes + receipts POST here
  ITEMS_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTd0SgxxSNZv02BA8skGGH4k6vckMumj_a8uFp5qO3Ks5-vSWj6SrnpGP4rzK3ez6tKydmQFU8-PfO9/pub?gid=0&single=true&output=csv",
  VOTES_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTd0SgxxSNZv02BA8skGGH4k6vckMumj_a8uFp5qO3Ks5-vSWj6SrnpGP4rzK3ez6tKydmQFU8-PfO9/pub?gid=1318533049&single=true&output=csv",
  WRITEINS_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTd0SgxxSNZv02BA8skGGH4k6vckMumj_a8uFp5qO3Ks5-vSWj6SrnpGP4rzK3ez6tKydmQFU8-PfO9/pub?gid=1005354348&single=true&output=csv", // powers the live "Write-In Buzz" board on Results
  PURCHASES_CSV_URL: "PASTE_PURCHASES_CSV_URL" // Receipts tab logs here; powers the 🛒 "bought last week" badge. See README.
};
/* ========================================================================== */

/* ---------- app state ---------- */
let ITEMS = [];          // [{category, item, pp, melt, active}]
let CATEGORY_ORDER = []; // category names in first-seen order
let ITEM_META = {};      // lowercased item -> {item, category, pp, melt}
let itemsLoaded = false;
let itemsPromise = null;

let selected = {};       // item name -> true
let voterName = "";
let writeinText = "";    // typed write-in suggestions (banked, promoted weekly)
let ppOnly = false;      // filter: pocket-proof only
let hideMelty = false;   // filter: hide melty stuff
let submitting = false;

const MAX_PER_CATEGORY = 3; // each voter may pick at most this many items per section

let budgetCfg = { people: 55, perPerson: 2, days: 7, weekly: 850 };
let planQty = {};        // winning item -> packs to buy
let planSeeded = false;  // seed suggested quantities once

let LAST_WEEK_ITEMS = {}; // lowercased item -> true (purchased during the previous calendar week)
let purchasesLoaded = false;

/* ---------- receipt (Receipts tab) state ---------- */
let rcLines = [];        // [{item, qty, price, category}] — editable review rows
let rcDate = "";         // purchase date (yyyy-mm-dd)
let rcStore = "";        // optional store label
let rcPhotos = [];       // [{name, url}] — one long receipt can span several photos
let rcStatus = "";       // OCR progress / status message
let rcBusy = false;      // OCR running
let rcSubmitting = false;
let rcDone = false;      // a receipt was just submitted (show confirmation)
let tesseractPromise = null;
let pdfjsPromise = null;

/* ---------- tiny config guards ---------- */
function isSet(url){ return url && url.indexOf("PASTE_") === -1; }
function scriptReady(){ return isSet(CONFIG.SCRIPT_URL); }
function itemsUrlReady(){ return isSet(CONFIG.ITEMS_CSV_URL); }
function votesUrlReady(){ return isSet(CONFIG.VOTES_CSV_URL); }
function writeinsUrlReady(){ return isSet(CONFIG.WRITEINS_CSV_URL); }
function purchasesUrlReady(){ return isSet(CONFIG.PURCHASES_CSV_URL); }

/* ============================================================================
   CSV PARSER  (inline, no library — survives a CDN outage)
   Handles quoted fields, escaped "" quotes, and \r\n / \n line endings.
   ============================================================================ */
function parseCSV(text){
  const rows = []; let row = [], field = "", q = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i];
    if (q){
      if (ch === '"'){ if (text[i+1] === '"'){ field += '"'; i++; } else q = false; }
      else field += ch;
    } else {
      if (ch === '"') q = true;
      else if (ch === ','){ row.push(field); field = ""; }
      else if (ch === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if (ch === '\r'){ /* ignore */ }
      else field += ch;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

/* Map a header row to column indexes by (trimmed, lowercased) name,
   so column ORDER in the sheet doesn't matter. */
function headerIndex(headerRow){
  const idx = {};
  headerRow.forEach((h, i) => { idx[String(h).trim().toLowerCase()] = i; });
  return idx;
}
function truthy(v){
  const s = String(v == null ? "" : v).trim().toLowerCase();
  return s === "y" || s === "yes" || s === "true" || s === "1";
}
/* Map the Tag dropdown value to the two badge flags.
   Fire Ground -> pocket-proof | Heat -> melts | Both -> both | blank -> neither */
function tagToFlags(v){
  const t = String(v == null ? "" : v).trim().toLowerCase();
  if (t === "both") return { pp: true, melt: true };
  if (t === "fire ground" || t === "fireground" || t === "fire") return { pp: true, melt: false };
  if (t === "heat") return { pp: false, melt: true };
  return { pp: false, melt: false };
}
/* Parse a number from a cell, stripping $ and commas. Returns null if empty/NaN. */
function num(v){
  const n = parseFloat(String(v == null ? "" : v).replace(/[^0-9.\-]/g, ""));
  return isFinite(n) ? n : null;
}

/* ============================================================================
   ITEMS  (the ballot — built entirely from the Items tab)
   ============================================================================ */
function loadItems(force){
  if (itemsPromise && !force) return itemsPromise;
  itemsPromise = (async () => {
    if (!itemsUrlReady()) throw new Error("ITEMS_CSV_URL not set");
    const url = CONFIG.ITEMS_CSV_URL + (CONFIG.ITEMS_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = parseCSV(await res.text()).filter(r => r.length && r.some(c => String(c).trim() !== ""));
    if (!rows.length) throw new Error("empty");

    const h = headerIndex(rows[0]);
    const cCat = h["category"], cItem = h["item"];
    const cTag = h["tag"];                          // new single dropdown column
    const cPP = h["pocketproof"], cMelt = h["melts"]; // legacy fallback columns
    const cAct = h["active"];
    const cPrice = h["price"], cServ = h["servings"]; // optional, for the Budget tab
    if (cCat == null || cItem == null) throw new Error("Items tab needs Category and Item columns");

    const items = [], order = [], meta = {}, seenCat = {};
    for (let i = 1; i < rows.length; i++){
      const r = rows[i];
      const category = String(r[cCat] == null ? "" : r[cCat]).trim();
      const item = String(r[cItem] == null ? "" : r[cItem]).trim();
      if (!category || !item) continue;
      const active = cAct == null ? true : truthy(r[cAct]);
      if (!active) continue;
      let pp, melt;
      if (cTag != null){                            // Tag wins when present
        const f = tagToFlags(r[cTag]); pp = f.pp; melt = f.melt;
      } else {
        pp = cPP == null ? false : truthy(r[cPP]);
        melt = cMelt == null ? false : truthy(r[cMelt]);
      }
      const price = cPrice == null ? null : num(r[cPrice]);
      const servings = cServ == null ? null : num(r[cServ]);
      items.push({ category, item, pp, melt, price, servings });
      meta[item.toLowerCase()] = { item, category, pp, melt, price, servings };
      if (!seenCat[category]){ seenCat[category] = true; order.push(category); }
    }
    ITEMS = items; CATEGORY_ORDER = order; ITEM_META = meta; itemsLoaded = true;
    return items;
  })();
  return itemsPromise;
}

/* ============================================================================
   PURCHASES  (drives the 🛒 "bought last week" badge on the ballot)
   Reads the Purchases tab — one row per bought line item, with a date.
   ============================================================================ */
/* Monday-00:00 (local) of the week containing date d. */
function weekStart(d){
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = (x.getDay() + 6) % 7; // Mon=0 … Sun=6
  x.setDate(x.getDate() - dow);
  x.setHours(0, 0, 0, 0);
  return x;
}
/* The half-open range [start, end) covering the PREVIOUS calendar week. */
function lastWeekRange(now){
  const thisStart = weekStart(now || new Date());
  const lastStart = new Date(thisStart); lastStart.setDate(lastStart.getDate() - 7);
  return { start: lastStart, end: thisStart };
}
/* Tolerant date parse for receipt dates: ISO (yyyy-mm-dd), or m/d/yyyy. */
function parseDate(v){
  const s = String(v == null ? '' : v).trim();
  if (!s) return null;
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m){ let y = +m[3]; if (y < 100) y += 2000; return new Date(y, +m[1] - 1, +m[2]); }
  const t = Date.parse(s);
  return isNaN(t) ? null : new Date(t);
}

function loadPurchases(){
  if (!purchasesUrlReady()) return Promise.resolve();
  return (async () => {
    const url = CONFIG.PURCHASES_CSV_URL + (CONFIG.PURCHASES_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = parseCSV(await res.text()).filter(r => r.length && r.some(c => String(c).trim() !== ""));
    if (!rows.length){ LAST_WEEK_ITEMS = {}; purchasesLoaded = true; return; }
    const h = headerIndex(rows[0]);
    const cDate = h["date"], cItem = h["item"];
    const range = lastWeekRange(new Date());
    const set = {};
    for (let i = 1; i < rows.length; i++){
      const r = rows[i];
      const item = String((cItem != null ? r[cItem] : r[1]) || '').trim();
      const d = parseDate(cDate != null ? r[cDate] : r[0]);
      if (!item || !d) continue;
      if (d >= range.start && d < range.end) set[item.toLowerCase()] = true;
    }
    LAST_WEEK_ITEMS = set; purchasesLoaded = true;
  })();
}

function renderVote(){
  const el = document.getElementById('vote-view');

  let h = `<div class="namebar">
      <div class="lbl">Your name</div>
      <input id="nameInput" class="name" autocomplete="off" placeholder="Use first name + last initial (e.g. Mike R.)" value="${esc(voterName)}">
      <div class="namehelp">Use first name + last initial (e.g. Mike R.) — duplicates by name get overwritten.</div>
      <div class="filters">

        <div class="filter${hideMelty ? ' on' : ''}" id="f-melt"><div class="toggle"><div class="knob"></div></div>Hide melty stuff</div>
      </div>
    </div>`;

  let shownAny = false;
  CATEGORY_ORDER.forEach(cat => {
    const list = ITEMS.filter(it =>
      it.category === cat &&
      (!ppOnly || it.pp) &&
      (!hideMelty || !it.melt)

    if (!list.length) return;
    shownAny = true;
    const csel = categorySelectedCount(cat);
    const maxed = csel >= MAX_PER_CATEGORY;
    h += `<div class="cat"><div class="catname">${esc(cat)}<span class="catcount${maxed ? ' full' : ''}">${csel}/${MAX_PER_CATEGORY}</span></div><div class="grid">`;
    list.forEach(it => {
      const on = !!selected[it.item];
      const lock = maxed && !on;
      const lastWeek = !!LAST_WEEK_ITEMS[it.item.toLowerCase()];
      const badges = (it.pp ? '🟢' : '') + (it.melt ? '🫠' : '') + (lastWeek ? '🛒' : '');
      h += `<button class="item${on ? ' sel' : ''}${lock ? ' lock' : ''}" type="button" data-item="${esc(it.item)}">
              <span class="check">${on ? '✓' : ''}</span>
              <span class="iname">${esc(it.item)}</span>
              <span class="badges">${badges}</span>
            </button>`;
    });
    h += `</div></div>`;
  });

  if (!shownAny){
    h += `<div class="msg warn">No snacks match your filters. Try turning a filter off.</div>`;
  }

  // Write-in box. Suggestions are banked and promoted onto the ballot each Monday.
  h += `<div class="cat"><div class="catname">Missing something?</div>
      <textarea id="writein" class="writein" placeholder="Write in snacks we don't stock yet — one per line. Crew write-ins get added to the ballot every Monday.">${esc(writeinText)}</textarea></div>`;

  const ready = canSubmit();
  h += `<button id="submitBtn" class="submit" type="button" ${ready ? '' : 'disabled'}>${submitLabel()}</button>`;
  el.innerHTML = h;

  // wire events (no inline handlers)
  document.getElementById('nameInput').addEventListener('input', onName);
  document.getElementById('f-pp').addEventListener('click', () => { ppOnly = !ppOnly; renderVote(); });
  document.getElementById('f-melt').addEventListener('click', () => { hideMelty = !hideMelty; renderVote(); });
  el.querySelectorAll('.item').forEach(btn => {
    btn.addEventListener('click', () => pick(btn.getAttribute('data-item')));
  });
  document.getElementById('submitBtn').addEventListener('click', submitVote);
  const wiBox = document.getElementById('writein');
  if (wiBox) wiBox.addEventListener('input', () => { writeinText = wiBox.value; refreshSubmitBtn(); });
}

function selectedCount(){ return Object.keys(selected).filter(k => selected[k]).length; }
function canSubmit(){ return !!voterName.trim() && (selectedCount() > 0 || writeinText.trim().length > 0); }
function categorySelectedCount(cat){
  if (!cat) return 0;
  let n = 0;
  Object.keys(selected).forEach(it => {
    if (selected[it] && (ITEM_META[it.toLowerCase()] || {}).category === cat) n++;
  });
  return n;
}
function submitLabel(){
  if (submitting) return 'Submitting…';
  if (!voterName.trim()) return 'Enter your name first';
  const c = selectedCount();
  if (c === 0 && writeinText.trim()) return 'Submit write-in';
  if (c === 0) return 'Pick a snack or write one in';
  return 'Submit ' + c + ' pick' + (c === 1 ? '' : 's');
}
function refreshSubmitBtn(){
  const b = document.getElementById('submitBtn');
  if (!b) return;
  b.disabled = submitting || !canSubmit();
  b.textContent = submitLabel();
}
function onName(){ voterName = document.getElementById('nameInput').value; refreshSubmitBtn(); }
function pick(item){
  if (!item) return;
  if (!selected[item]){
    // turning ON — enforce the per-section cap
    const cat = (ITEM_META[item.toLowerCase()] || {}).category;
    if (categorySelectedCount(cat) >= MAX_PER_CATEGORY){
      showToast('Max ' + MAX_PER_CATEGORY + ' per section — un-pick one first');
      return;
    }
  }
  selected[item] = !selected[item];
  renderVote();
}

async function submitVote(){
  if (submitting) return;
  voterName = (document.getElementById('nameInput') || {}).value || voterName;
  const wiBox = document.getElementById('writein');
  if (wiBox) writeinText = wiBox.value;
  const items = Object.keys(selected).filter(k => selected[k]);
  const suggestion = writeinText.trim();
  if (!voterName.trim()){ alert("Add your name first."); return; }
  if (!items.length && !suggestion){ alert("Pick a snack or write one in."); return; }
  if (!scriptReady()){
    alert("Not connected to Google yet — paste SCRIPT_URL into the CONFIG block at the top of index.html.");
    return;
  }

  submitting = true; refreshSubmitBtn();
  const payload = { name: voterName.trim(), items: items, suggestion: suggestion, timestamp: new Date().toISOString() };

  try {
    // Fire-and-forget: text/plain + no-cors dodges the CORS preflight.
    // We CANNOT read this response, so we go optimistic and re-fetch Votes.
    await fetch(CONFIG.SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
  } catch (e){
    submitting = false; refreshSubmitBtn();
    alert("Couldn't reach Google — check your connection and try again.");
    return;
  }

  showToast("Vote submitted — thanks, " + voterName.trim());
  writeinText = "";                   // clear so it isn't resubmitted
  submitting = false;
  setView('results');
  setTimeout(() => loadResults(), 4000);
}

  }

/* Dedup by name (latest submission wins), then count votes per item.
   Each submission shares ONE timestamp, so a voter's "latest batch" is the
   set of rows carrying their max timestamp. */
function tally(rows){
  const byName = {}; // lcName -> { display, batches: { tsRaw -> {tsNum, order, items:Set} } }
  let order = 0;
  rows.forEach(r => {
    if (!r || r.length < 3) return;
    const tsRaw = String(r[0] || '').trim();
    const name  = String(r[1] || '').trim();
    const item  = String(r[2] || '').trim();
    if (!name || !item) return;
    if (name.toLowerCase() === 'name' && item.toLowerCase() === 'item') return; // header
    const key = name.toLowerCase();
    const voter = byName[key] || (byName[key] = { display: name, batches: {} });
    const b = voter.batches[tsRaw] || (voter.batches[tsRaw] = { tsNum: Date.parse(tsRaw), order: order, items: new Set() });
    b.items.add(item);
    order++;
  });

  const counts = {};
  let uniqueVoters = 0;
  const voterNames = [];
  Object.keys(byName).forEach(key => {
    const voter = byName[key];
    let chosen = null;
    Object.keys(voter.batches).forEach(ts => {
      const b = voter.batches[ts];
      if (!chosen){ chosen = b; return; }
      const bNaN = isNaN(b.tsNum), cNaN = isNaN(chosen.tsNum);
      if (!bNaN && !cNaN){ if (b.tsNum > chosen.tsNum) chosen = b; }
      else if (!bNaN && cNaN){ chosen = b; }              // real timestamp beats unparseable
      else if (bNaN && cNaN){ if (b.order > chosen.order) chosen = b; } // both bad -> later row
    });
    if (chosen && chosen.items.size){
      uniqueVoters++;
      voterNames.push(voter.display);
      chosen.items.forEach(it => { counts[it] = (counts[it] || 0) + 1; });
    }
  });
  return { counts, uniqueVoters, voterNames };
}

/* Count this week's write-ins by how many DIFFERENT people asked for each thing.
   Only un-promoted rows (blank Status) count — Monday's job stamps Status, which
   also resets the buzz for the new week. One person = one mention per suggestion. */
function tallyWriteins(rows){
  if (!rows || !rows.length) return [];
  const idx = headerIndex(rows[0]);
  const cName = idx['name'], cSug = idx['suggestion'], cStat = idx['status'];
  if (cName == null || cSug == null) return [];

  const people = {};   // suggestionKey -> Set(personKey)
  const display = {};  // suggestionKey -> first-seen original text
  for (let i = 1; i < rows.length; i++){
    const r = rows[i];
    const status = cStat == null ? '' : String(r[cStat] == null ? '' : r[cStat]).trim();
    if (status) continue; // already promoted in a past week
    const name = String(r[cName] == null ? '' : r[cName]).trim();
    const sug  = String(r[cSug]  == null ? '' : r[cSug]).trim();
    if (!name || !sug) continue;
    sug.split(/[\r\n]+/).map(s => s.trim()).filter(Boolean).forEach(p => {
      const key = p.toLowerCase().replace(/\s+/g, ' ');
      if (!display[key]) display[key] = p;
      (people[key] || (people[key] = new Set())).add(name.toLowerCase());
    });
  }
  return Object.keys(people).map(key => ({
    text: display[key],
    count: people[key].size,
    onBallot: !!ITEM_META[key]
  })).sort((a, b) => b.count - a.count || a.text.localeCompare(b.text));
}

/* Render the Write-In Buzz block (shared by both results paths). */
function renderBuzzBlock(buzz){
  if (!buzz || !buzz.length) return '';
  const bmax = buzz[0].count;
  let h = `<div class="cat"><div class="catname">Write-In Buzz<span class="catcount">this week</span></div>
      <p class="note">What the crew keeps asking for. ★ = 3+ people — promoting to the ballot Monday.</p>`;
  buzz.forEach(b => {
    const pct = bmax ? Math.round((b.count / bmax) * 100) : 0;
    const star = b.count >= 3 ? '★ ' : '';
    const tag = b.onBallot ? ' (already on ballot)' : '';
    h += `<div class="row">
        <div class="rowtop"><span class="rname">${star}${esc(b.text)}${tag}</span>
        <span class="rct">${b.count} ${b.count === 1 ? 'mention' : 'mentions'}</span></div>
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      </div>`;
  });
  return h + `</div>`;
}

function renderResults(data, buzz){
  const el = document.getElementById('results-view');
  const { counts, uniqueVoters, voterNames } = data;
  const distinctItems = Object.keys(counts).length;
  let totalVotes = 0; Object.keys(counts).forEach(k => totalVotes += counts[k]);

  let h = `<div class="statrow">
      <div class="statcard"><div class="statnum">${uniqueVoters}</div><div class="statlbl">Crew voted</div></div>
      <div class="statcard"><div class="statnum">${distinctItems}</div><div class="statlbl">Snacks picked</div></div>
      <div class="statcard"><div class="statnum">${totalVotes}</div><div class="statlbl">Total votes</div></div>
    </div>
    <div class="toolbar"><button id="refreshBtn" class="btn" type="button">Refresh</button></div>
    <p class="note">Results refresh from Google every few minutes — not instant.</p>`;

  if (uniqueVoters === 0){
    h += `<div class="msg warn">No votes yet. Share the link and they'll show up here.</div>`;
    h += renderBuzzBlock(buzz);   // buzz can exist before any formal votes
    el.innerHTML = h;
    document.getElementById('refreshBtn').addEventListener('click', loadResults);
    return;
  }

  const max = Math.max.apply(null, Object.values(counts));

  // Group ranked results by category (using Items metadata, first-seen order).
  // Voted items not found in the current ballot fall under "Other".
  const used = {};
  const groups = CATEGORY_ORDER.slice();
  groups.forEach(cat => {
    const ranked = Object.keys(counts)
      .filter(item => (ITEM_META[item.toLowerCase()] || {}).category === cat)
      .map(item => ({ item, ct: counts[item], meta: ITEM_META[item.toLowerCase()] }))
      .sort((a, b) => b.ct - a.ct);
    ranked.forEach(x => used[x.item.toLowerCase()] = true);
    if (!ranked.length) return;
    h += renderRankBlock(cat, ranked, max, uniqueVoters);
  });
  const leftovers = Object.keys(counts)
    .filter(item => !used[item.toLowerCase()])
    .map(item => ({ item, ct: counts[item], meta: ITEM_META[item.toLowerCase()] }))
    .sort((a, b) => b.ct - a.ct);
  if (leftovers.length) h += renderRankBlock("Other / write-ins", leftovers, max, uniqueVoters);

  // Live write-in buzz (this week's suggestions, before Monday's promotion)
  h += renderBuzzBlock(buzz);

  // Roll call
  h += `<div class="cat"><div class="catname">Who's voted</div><div style="margin-top:10px">`;
  voterNames.sort((a,b)=>a.localeCompare(b)).forEach(n => h += `<span class="chip" style="display:inline-block;font-size:12.5px;background:var(--steel);color:#cfd3da;padding:5px 11px;border-radius:20px;margin:3px 4px 0 0">${esc(n)}</span>`);
  h += `</div></div>`;

  el.innerHTML = h;
  document.getElementById('refreshBtn').addEventListener('click', loadResults);
}

function renderRankBlock(title, ranked, max, voters){
  let h = `<div class="cat"><div class="catname">${esc(title)}</div>`;
  ranked.forEach((x, i) => {
    const pct = max ? Math.round((x.ct / max) * 100) : 0;
    const share = voters ? Math.round((x.ct / voters) * 100) : 0;
    const m = x.meta || {};
    const badges = (m.pp ? ' 🟢' : '') + (m.melt ? ' 🫠' : '') + (LAST_WEEK_ITEMS[x.item.toLowerCase()] ? ' 🛒' : '');
    const crown = i === 0 ? '★ ' : '';
    h += `<div class="row">
        <div class="rowtop"><span class="rname">${crown}${esc(x.item)}${badges}</span>
        <span class="rct">${x.ct} · ${share}%</span></div>
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      </div>`;
  });
  h += `</div>`;
  return h;
}

/* ============================================================================
   BUDGET VIEW  (top 3 per section + a weekly shopping planner)
   ============================================================================ */
async function loadBudget(){
  const el = document.getElementById('budget-view');
  if (!votesUrlReady() || !itemsUrlReady()){
    el.innerHTML = `<div class="msg warn">Connect the Items and Votes CSV URLs first (see README) to build a budget.</div>`;
    return;
  }
  el.innerHTML = `<div class="center"><div class="spinner"></div><p>Crunching the numbers…</p></div>`;
  try {
    if (!itemsLoaded){ await loadItems(); }
    const url = CONFIG.VOTES_CSV_URL + (CONFIG.VOTES_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    window._budgetCounts = tally(parseCSV(await res.text())).counts;
    renderBudget();
  } catch (e){
    el.innerHTML = `<div class="msg err">Couldn't load data for the budget.<br><span class="note" style="color:#ffd2d6">(${esc(e.message)})</span></div>`;
  }
}

/* Top 3 voted items in each section (only items that actually got votes). */
function topThreePerSection(counts){
  const out = [];
  CATEGORY_ORDER.forEach(cat => {
    const ranked = ITEMS.filter(it => it.category === cat)
      .map(it => ({ item: it.item, ct: counts[it.item] || 0, meta: it }))
      .filter(x => x.ct > 0)
      .sort((a, b) => b.ct - a.ct)
      .slice(0, 3);
    if (ranked.length) out.push({ section: cat, items: ranked });
  });
  return out;
}

/* Seed suggested pack quantities: split the weekly serving target across the
   winners in proportion to their votes, then round up to whole packs. */
function seedPlan(groups, targetServings){
  const winners = [];
  groups.forEach(g => g.items.forEach(x => winners.push(x)));
  const totalVotes = winners.reduce((s, x) => s + x.ct, 0) || 1;
  const q = {};
  winners.forEach(x => {
    const serv = x.meta.servings, price = x.meta.price;
    if (!serv || price == null){ q[x.item] = 0; return; }
    const alloc = targetServings * (x.ct / totalVotes);
    q[x.item] = Math.max(1, Math.ceil(alloc / serv));
  });
  return q;
}

function renderBudget(){
  const el = document.getElementById('budget-view');
  const counts = window._budgetCounts || {};
  const groups = topThreePerSection(counts);
  const target = (budgetCfg.people || 0) * (budgetCfg.perPerson || 0) * (budgetCfg.days || 0);

  if (!planSeeded){ planQty = seedPlan(groups, target); planSeeded = true; }

  let h = `<div class="bgrid">
      ${numField('People / day', 'b-people', budgetCfg.people)}
      ${numField('Snacks / person / day', 'b-per', budgetCfg.perPerson)}
      ${numField('Days / week', 'b-days', budgetCfg.days)}
      ${numField('Weekly budget ($)', 'b-week', budgetCfg.weekly)}
    </div>
    <div class="toolbar">
      <button id="b-suggest" class="btn" type="button">Suggest qty</button>
      <button id="b-refresh" class="btn" type="button">Refresh votes</button>
      <button id="b-copy" class="btn" type="button">Copy list</button>
    </div>
    <p class="note">Target this week: <b>${target}</b> servings (${budgetCfg.people} people × ${budgetCfg.perPerson} snacks × ${budgetCfg.days} days). Quantities are in <b>packs</b>; tweak any of them.</p>`;

  if (!groups.length){
    h += `<div class="msg warn">No votes yet, so there are no section winners to budget. Once the crew votes, the top 3 per section show up here.</div>`;
    el.innerHTML = h; wireBudget(); return;
  }

  let total = 0, plannedServings = 0, missingPrice = 0;
  groups.forEach(g => {
    h += `<div class="cat"><div class="catname">${esc(g.section)}<span class="catcount">top ${g.items.length}</span></div>`;
    g.items.forEach(x => {
      const price = x.meta.price, serv = x.meta.servings, qty = planQty[x.item] || 0;
      const priced = (price != null && serv != null && serv > 0);
      if (!priced) missingPrice++;
      const line = priced ? price * qty : null;
      if (line != null){ total += line; plannedServings += qty * serv; }
      const cps = priced ? (price / serv) : null;
      const metaTxt = x.ct + ' vote' + (x.ct === 1 ? '' : 's')
        + (price != null ? ' · $' + price.toFixed(2) + '/pack' : ' · no price')
        + (serv ? ' · ' + serv + '/pack' : '')
        + (cps != null ? ' · $' + cps.toFixed(2) + '/serving' : '');
      h += `<div class="brow">
          <div class="binfo"><div class="bname">${esc(x.item)} ${x.meta.pp ? '🟢' : ''}${x.meta.melt ? '🫠' : ''}</div>
            <div class="bmeta">${metaTxt}</div></div>
          <div class="bqty">
            <button class="qbtn" type="button" data-item="${esc(x.item)}" data-d="-1">–</button>
            <input class="qin" inputmode="numeric" data-item="${esc(x.item)}" value="${qty}">
            <button class="qbtn" type="button" data-item="${esc(x.item)}" data-d="1">+</button>
          </div>
          <div class="bcost">${line != null ? '$' + line.toFixed(2) : '—'}</div>
        </div>`;
    });
    h += `</div>`;
  });

  const weekly = budgetCfg.weekly || 0;
  const pct = weekly ? Math.min(100, Math.round((total / weekly) * 100)) : 0;
  const over = total > weekly;
  h += `<div class="bsum">
      <div class="bbar"><div class="bbarfill ${over ? 'over' : ''}" style="width:${pct}%"></div></div>
      <div class="bsumrow"><span>Planned weekly cost</span><strong class="${over ? 'red' : ''}">$${total.toFixed(2)}</strong></div>
      <div class="bsumrow"><span>Weekly budget</span><strong>$${weekly.toFixed(2)}</strong></div>
      <div class="bsumrow"><span>${over ? 'Over budget by' : 'Remaining'}</span><strong class="${over ? 'red' : 'green'}">$${Math.abs(weekly - total).toFixed(2)}</strong></div>
      <div class="bsumrow"><span>Servings planned vs target</span><strong>${plannedServings} / ${target}</strong></div>
      ${missingPrice ? `<p class="note">${missingPrice} winning item(s) have no Price/Servings yet — add them in the Items tab to include them.</p>` : ''}
      <p class="note">Prices come from the Items tab and are estimates — verify at your store.</p>
    </div>`;
  el.innerHTML = h;
  wireBudget();
}

function numField(label, id, val){
  return `<label class="bfield"><span>${label}</span><input id="${id}" class="bnum" inputmode="numeric" value="${val}"></label>`;
}
function wireBudget(){
  const map = { 'b-people':'people', 'b-per':'perPerson', 'b-days':'days', 'b-week':'weekly' };
  Object.keys(map).forEach(id => {
    const elx = document.getElementById(id);
    if (elx) elx.addEventListener('change', () => { budgetCfg[map[id]] = Math.max(0, num(elx.value) || 0); renderBudget(); });
  });
  const sg = document.getElementById('b-suggest'); if (sg) sg.addEventListener('click', () => { planSeeded = false; renderBudget(); });
  const rf = document.getElementById('b-refresh'); if (rf) rf.addEventListener('click', loadBudget);
  const cp = document.getElementById('b-copy'); if (cp) cp.addEventListener('click', copyShoppingList);
  document.querySelectorAll('.qbtn').forEach(b => b.addEventListener('click',
    () => adjustQty(b.getAttribute('data-item'), parseInt(b.getAttribute('data-d'), 10))));
  document.querySelectorAll('.qin').forEach(inp => inp.addEventListener('change',
    () => { planQty[inp.getAttribute('data-item')] = Math.max(0, parseInt(inp.value, 10) || 0); renderBudget(); }));
}
function adjustQty(item, d){ planQty[item] = Math.max(0, (planQty[item] || 0) + d); renderBudget(); }

function copyShoppingList(){
  const groups = topThreePerSection(window._budgetCounts || {});
  const lines = ['FIREHOUSE SNACK SHOPPING LIST',
    '(' + budgetCfg.people + ' people/day x ' + budgetCfg.perPerson + ' snacks x ' + budgetCfg.days + ' days)', ''];
  let total = 0;
  groups.forEach(g => {
    lines.push('[' + g.section + ']');
    g.items.forEach(x => {
      const qty = planQty[x.item] || 0, price = x.meta.price;
      const cost = (price != null) ? price * qty : null;
      if (cost != null) total += cost;
      lines.push('  ' + qty + ' x ' + x.item + (price != null ? '  @ $' + price.toFixed(2) + ' = $' + cost.toFixed(2) : '  (no price)'));
    });
    lines.push('');
  });
  lines.push('TOTAL: $' + total.toFixed(2) + '  /  budget $' + Number(budgetCfg.weekly).toFixed(2));
  const text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(() => showToast('Shopping list copied'), () => downloadText(text));
  } else downloadText(text);
}
function downloadText(text){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = 'snack-shopping-list.txt'; a.click();
}

/* ============================================================================
   RECEIPTS VIEW  (photo -> on-device OCR -> review -> report -> log + ballot)
   OCR runs in the browser via Tesseract.js (loaded from a CDN on first use).
   Nothing leaves the device until you hit "Save receipt".
   ============================================================================ */
function todayISO(){
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
}

function initReceipts(){
  if (!rcDate) rcDate = todayISO();
  // Pull metadata so category suggestions match the existing ballot sections.
  if (!itemsLoaded && itemsUrlReady()){ loadItems().catch(()=>{}).then(renderReceipts); }
  renderReceipts();
}

function renderReceipts(){

      });

      <p class="note">Fix any names/prices the scan got wrong. Qty × price ea. = line total. Category controls which ballot section the item joins.${rcPhotos.length > 1 ? ' <b>Multiple photos merged</b> — overlapping rows were removed, but double-check for any stragglers.' : ''}</p>

function renderReceiptReportHTML(){
  const r = computeReceiptReport();
  if (!r.lines.length) return '';
  let h = `<div class="report"><h3>Receipt report</h3>
      <div class="note">${esc(rcStore || 'Purchase')}${rcDate ? ' · ' + esc(rcDate) : ''} · ${r.lines.length} item${r.lines.length===1?'':'s'}, ${r.totalQty} unit${r.totalQty===1?'':'s'}</div>`;
  r.sections.forEach(sec => {
    h += `<div class="rsec">${esc(sec.name)} — $${sec.total.toFixed(2)}</div>`;
    sec.items.forEach(it => {
      h += `<div class="rln"><span>${esc(it.qty)} × ${esc(it.item)}</span><span>${it.lineTotal != null ? '$' + it.lineTotal.toFixed(2) : '—'}</span></div>`;
    });
  });
  h += `<div class="rtot"><span>Total</span><span>$${r.total.toFixed(2)}</span></div></div>`;
  return h;
}

/* Group the (edited) lines by category and total them up. */
function computeReceiptReport(){
  const lines = rcLines
    .map(l => {
      const qty = Math.max(0, parseInt(l.qty, 10) || 0);
      const price = (l.price === '' || l.price == null) ? null : (num(l.price));
      const lineTotal = price != null ? qty * price : null;
      return { item: String(l.item || '').trim(), qty, price, lineTotal, category: String(l.category || '').trim() || 'Other' };
    })
    .filter(l => l.item);
  const order = [], byCat = {};
  lines.forEach(l => { if (!byCat[l.category]){ byCat[l.category] = []; order.push(l.category); } byCat[l.category].push(l); });
  let total = 0, totalQty = 0;
  const sections = order.map(name => {
    let st = 0;
    byCat[name].forEach(l => { if (l.lineTotal != null) st += l.lineTotal; totalQty += l.qty; });
    total += st;
    return { name, items: byCat[name], total: st };
  });
  return { lines, sections, total, totalQty };
}

function buildReceiptReportText(){
  const r = computeReceiptReport();
  const out = ['FIREHOUSE RECEIPT — what was bought',
    (rcStore ? rcStore + '  ' : '') + (rcDate || ''), ''];
  r.sections.forEach(sec => {
    out.push('[' + sec.name + ']  $' + sec.total.toFixed(2));
    sec.items.forEach(it => {
      out.push('  ' + it.qty + ' x ' + it.item +
        (it.price != null ? '  @ $' + it.price.toFixed(2) + ' = $' + it.lineTotal.toFixed(2) : '  (no price)'));
    });
    out.push('');
  });
  out.push('TOTAL: $' + r.total.toFixed(2) + '  (' + r.totalQty + ' units)');
  return out.join('\n');
}

function wireReceipts(){
  const drop = document.getElementById('rc-drop');
  const file = document.getElementById('rc-file');
  if (drop && file){
    drop.addEventListener('click', () => file.click());
    file.addEventListener('change', () => { if (file.files && file.files.length) handleReceiptFiles(file.files); });
    ['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
    ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
    drop.addEventListener('drop', e => { const f = e.dataTransfer && e.dataTransfer.files; if (f && f.length) handleReceiptFiles(f); });
  }
  document.querySelectorAll('.thumbx').forEach(b => b.addEventListener('click', () => removeReceiptPhoto(+b.getAttribute('data-photo'))));
  const man = document.getElementById('rc-manual');
  if (man) man.addEventListener('click', () => { addRcRow(); });
  const nw = document.getElementById('rc-new');
  if (nw) nw.addEventListener('click', () => { resetReceipt(); renderReceipts(); });

  const dt = document.getElementById('rc-date'); if (dt) dt.addEventListener('change', () => { rcDate = dt.value; });
  const st = document.getElementById('rc-store'); if (st) st.addEventListener('input', () => { rcStore = st.value; });

  document.querySelectorAll('.rtable input').forEach(inp => {
    const handler = () => {
      const i = +inp.getAttribute('data-i'), k = inp.getAttribute('data-k');
      if (rcLines[i]){ rcLines[i][k] = inp.value; updateReportPreview(); }
    };
    inp.addEventListener('input', handler);
  });
  document.querySelectorAll('.xbtn').forEach(b => b.addEventListener('click', () => removeRcRow(+b.getAttribute('data-x'))));

  const add = document.getElementById('rc-add'); if (add) add.addEventListener('click', () => addRcRow());
  const copy = document.getElementById('rc-copy'); if (copy) copy.addEventListener('click', copyReceiptReport);
  const save = document.getElementById('rc-save'); if (save) save.addEventListener('click', submitReceipt);
}

function addRcRow(){

function removeReceiptPhoto(i){

function resetReceipt(){

/* ---- OCR ---- */
function ensureTesseract(){
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (tesseractPromise) return tesseractPromise;
  tesseractPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = () => window.Tesseract ? resolve(window.Tesseract) : reject(new Error('Tesseract failed to load'));
    s.onerror = () => reject(new Error('Could not load the OCR library (offline?)'));
    document.head.appendChild(s);
  });
  return tesseractPromise;
}

function isPdfFile(f){ return f && (/pdf/i.test(f.type) || /\.pdf$/i.test(f.name || '')); }
function isImageFile(f){
  return f && (/^image\//.test(f.type) || /\.(jpe?g|png|heic|heif|webp)$/i.test(f.name || ''));
}
function isReceiptFile(f){ return isPdfFile(f) || isImageFile(f); }

/* Load pdf.js (CDN) on first use, for reading the text layer out of PDF receipts. */
function ensurePdfjs(){
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if (pdfjsPromise) return pdfjsPromise;
  pdfjsPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
    s.onload = () => {
      if (!window.pdfjsLib) return reject(new Error('pdf.js failed to load'));
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
      resolve(window.pdfjsLib);
    };
    s.onerror = () => reject(new Error('Could not load the PDF reader (offline?)'));
    document.head.appendChild(s);
  });
  return pdfjsPromise;
}

/* Pull the text out of a PDF's text layer, rebuilding one line per receipt row
   (group by y, order by x, add a space across big x-gaps). No OCR needed. */
async function pdfToText(file){
  const lib = await ensurePdfjs();
  const buf = await file.arrayBuffer();
  const pdf = await lib.getDocument({ data: buf }).promise;
  const lines = [];
  for (let p = 1; p <= pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const byRow = {};
    tc.items.forEach(it => {
      if (!it.str) return;
      const y = Math.round(it.transform[5]);
      (byRow[y] || (byRow[y] = [])).push({ x: it.transform[4], w: it.width || 0, s: it.str });
    });
    Object.keys(byRow).map(Number).sort((a, b) => b - a).forEach(y => {
      const parts = byRow[y].sort((a, b) => a.x - b.x);
      let line = '', prevEnd = null;
      parts.forEach(pt => {
        if (prevEnd != null && pt.x - prevEnd > 1) line += ' ';
        line += pt.s;
        prevEnd = pt.x + pt.w;
      });
      lines.push(line);
    });
  }
  return lines.join('\n');
}

/* Read one or more files for the SAME receipt (PDF text layer, or photo via OCR).
   Each file's line items are merged onto the running list, with the overlapping
   region between consecutive pages detected and dropped (see mergeReceiptLines). */
async function handleReceiptFiles(fileList){
  const files = Array.from(fileList).filter(isReceiptFile);
  if (!files.length){ showToast('Please choose a PDF or image receipt'); return; }

  rcDone = false;
  rcBusy = true;
  rcStatus = 'Reading…';
  renderReceipts();

  let T = null;  // Tesseract is loaded lazily, only if an image needs OCR

  let addedTotal = 0, droppedTotal = 0, failed = 0;
  for (let n = 0; n < files.length; n++){
    const file = files[n];
    const pdf = isPdfFile(file);
    rcPhotos.push({ name: file.name || ('receipt-' + rcPhotos.length), url: pdf ? '' : URL.createObjectURL(file), pdf: pdf });
    const pageNo = rcPhotos.length;
    rcStatus = (pdf ? 'Reading PDF ' : 'Reading photo ') + pageNo + '…';
    renderReceipts();
    try {
      let textOut = '';
      if (pdf){
        textOut = await pdfToText(file);
      } else {
        if (!T) T = await ensureTesseract();
        const { data } = await T.recognize(file, 'eng', {
          logger: m => { if (m.status === 'recognizing text') setOcrProgress(m.progress, 'Reading photo ' + pageNo + '… ' + Math.round(m.progress * 100) + '%'); }
        });
        textOut = data && data.text ? data.text : '';
      }
      const parsed = parseReceiptText(textOut);
      const merged = mergeReceiptLines(rcLines, parsed);
      addedTotal += merged.added;
      droppedTotal += merged.dropped;
      rcLines = merged.lines;
    } catch (e){ failed++; }
  }

  rcBusy = false;
  if (!rcLines.length){
    rcLines = [{ item: '', qty: 1, price: '', category: CATEGORY_ORDER[0] || '' }];
    rcStatus = "Couldn't pick out line items automatically — add them by hand below.";
  } else {
    rcStatus = rcLines.length + ' item' + (rcLines.length === 1 ? '' : 's')
      + (rcPhotos.length > 1 ? ' from ' + rcPhotos.length + ' files' : '')
      + (droppedTotal ? ' · ' + droppedTotal + ' overlapping row' + (droppedTotal === 1 ? '' : 's') + ' removed' : '')
      + ' — check them below.';
  }
  if (failed) rcStatus += ' (' + failed + ' file' + (failed === 1 ? '' : 's') + " couldn't be read)";
  renderReceipts();
}

/* Build a comparison key for a parsed line: normalized name + price + qty. */
function receiptLineKey(l){
  const name = String(l.item || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  const price = (l.price == null || l.price === '') ? '' : Number(l.price).toFixed(2);
  return name + '|' + price + '|' + (l.qty || 1);
}

/* Merge a new photo's lines onto the existing list. A long receipt shot in
   overlapping segments repeats a run of rows: the tail of what we have so far
   equals the head of the next photo. Find the longest such overlap and append
   only the genuinely new rows. Returns {lines, added, dropped}. */
function mergeReceiptLines(existing, incoming){
  if (!existing.length) return { lines: incoming.slice(), added: incoming.length, dropped: 0 };
  if (!incoming.length) return { lines: existing.slice(), added: 0, dropped: 0 };
  const maxK = Math.min(existing.length, incoming.length);
  let overlap = 0;
  for (let k = maxK; k >= 1; k--){
    let match = true;
    for (let j = 0; j < k; j++){
      if (receiptLineKey(existing[existing.length - k + j]) !== receiptLineKey(incoming[j])){ match = false; break; }
    }
    if (match){ overlap = k; break; }
  }
  const tail = incoming.slice(overlap);
  return { lines: existing.concat(tail), added: tail.length, dropped: overlap };
}

function setOcrProgress(p, msg){
  const bar = document.getElementById('rc-prog');
  const st = document.getElementById('rc-status');
  if (bar) bar.style.width = Math.max(5, Math.round((p || 0) * 100)) + '%';
  if (st && msg) st.textContent = msg;
}

/* Warehouse-receipt parser (tuned for Costco-style: "<flag> <item-code> NAME <price> <dept>").
   Drops the subtotal/tax/total/payment/savings noise and the "code / code  9.99-"
   instant-savings lines. Each item's printed price is its line total; qty is left at 1
   for the crew to bump in the review table. Tolerant of OCR/PDF text that loses the
   spaces between words. */
function parseReceiptText(text){
  const SKIP = /\b(sub\s*total|subtotal|total|tax|hst|gst|pst|vat|amount|balance|change|cash|debit|credit|visa|master|amex|tend|tender|approv|auth|ref|aid|account|card|terminal|store|tel|phone|receipt|cashier|reg(ister)?|invoice|order|date|time|thank|welcome|member|points|saving|loyalty|qty|whse|wholesale|costco|instant|sold|number of items|purchase|survey|chip)\b/i;
  const out = [];
  String(text || '').split(/\r?\n/).forEach(raw => {
    let line = raw.replace(/\s+/g, ' ').trim();
    if (line.length < 3) return;
    if (/^\d{3,}\s*\/\s*\d{3,}/.test(line)) return;     // "378601 / 1761722 22.40-" instant-savings line
    if (/-\s*$/.test(line)) return;                     // any trailing-minus (discount/credit)
    if (SKIP.test(line)) return;
    // trailing price, optionally followed by a 1–2 digit department/tax code (e.g. "71.96 3")
    const pm = line.match(/(?:\$\s*)?(\d{1,4}[.,]\d{2})(?:\s+\d{1,2})?\s*$/);
    if (!pm) return;
    const price = parseFloat(pm[1].replace(',', '.'));
    if (!(price > 0) || price > 900) return;
    let name = line.slice(0, pm.index).trim();
    name = name.replace(/^[EANF]\s*/, '').replace(/^[#*]+\s*/, '').replace(/^\d{1,7}\s*/, ''); // tax flag + item code (space optional)
    name = name.replace(/[^A-Za-z0-9 &.'\/-]/g, ' ').replace(/\s+/g, ' ').trim();
    if (name.length < 2 || !/[A-Za-z]/.test(name)) return;
    if (SKIP.test(name)) return;
    out.push({ item: name, qty: 1, price: price, category: guessCategory(name) });
  });
  return out;
}

function titleCase(s){
  return String(s).toLowerCase().replace(/\b([a-z])/g, c => c.toUpperCase());
}

/* Best-effort category guess: exact ballot match, then keyword buckets,
   else the first existing section (or "Snacks"). Crew can override. */
function guessCategory(name){
  const key = String(name).toLowerCase();
  const meta = ITEM_META[key];
  if (meta && meta.category) return meta.category;
  // partial match against known items
  for (const k in ITEM_META){
    if (k && (key.includes(k) || k.includes(key)) && k.length >= 4) return ITEM_META[k].category;
  }
  const buckets = [
    [/(chip|crisp|pretzel|popcorn|cracker|nut|jerky|trail)/, 'Salty / Crunchy'],
    [/(candy|chocolate|cookie|brownie|donut|granola|bar|sweet|gummy)/, 'Sweet'],
    [/(soda|cola|pop|water|gatorade|juice|coffee|tea|drink|energy|monster|red bull)/, 'Drinks'],
    [/(apple|banana|orange|grape|berry|fruit|veg|carrot|celery|yogurt|cheese|hummus)/, 'Fresh / Healthy'],
  ];
  for (const [re, cat] of buckets){
    if (re.test(key)){
      const existing = CATEGORY_ORDER.find(c => c.toLowerCase() === cat.toLowerCase());
      return existing || CATEGORY_ORDER[0] || cat;
    }
  }
  return CATEGORY_ORDER[0] || 'Snacks';
}

function copyReceiptReport(){
  const text = buildReceiptReportText();
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(() => showToast('Report copied'), () => downloadText(text));
  } else downloadText(text);
}

async function submitReceipt(){
  if (rcSubmitting) return;
  const r = computeReceiptReport();
  if (!r.lines.length){ alert('Add at least one item first.'); return; }
  if (!scriptReady()){ alert('Not connected to Google yet — paste SCRIPT_URL into the CONFIG block.'); return; }
  if (!rcDate){ alert('Pick the purchase date.'); return; }

  rcSubmitting = true; renderReceipts();
  const payload = {
    type: 'receipt',
    date: rcDate,
    store: rcStore.trim(),
    photo: rcPhotos.map(p => p.name).join('; '),
    photoCount: rcPhotos.length,
    total: +r.total.toFixed(2),
    lines: r.lines.map(l => ({ item: l.item, qty: l.qty, price: l.price, category: l.category })),
    timestamp: new Date().toISOString()
  };

  try {
    await fetch(CONFIG.SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
  } catch (e){
    rcSubmitting = false; renderReceipts();
    alert("Couldn't reach Google — check your connection and try again.");
    return;
  }

  showToast('Receipt saved — ' + r.lines.length + ' item' + (r.lines.length === 1 ? '' : 's') + ' logged');
  rcSubmitting = false;
  resetReceipt();
  rcDone = true;
  // Items list changed on the backend; drop our cache so the ballot reloads fresh.
  itemsLoaded = false; itemsPromise = null;
  renderReceipts();
}

/* ============================================================================
   UTILITIES
   ============================================================================ */
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ============================================================================
   BOOT
   ============================================================================ */
(function boot(){
  const missing = [];
  if (!scriptReady())   missing.push("SCRIPT_URL");
  if (!itemsUrlReady()) missing.push("ITEMS_CSV_URL");
  if (!votesUrlReady()) missing.push("VOTES_CSV_URL");
  if (missing.length){
    document.getElementById('banner').innerHTML =
      `<div class="msg warn"><b>Setup not finished.</b> Still need: ${missing.join(', ')}. Paste them into the CONFIG block at the top of index.html, then re-upload. See README.md.</div>`;
  }
  initVote();
})();
</script>
